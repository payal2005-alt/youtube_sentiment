<!DOCTYPE html>
<html lang="en">

    <title>YouTube Sentiment Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<body class="landing-page">

    <div class="bg-scene">
        <div class="left-outline-circle"></div>
        <div class="left-rect"></div>

        <div class="center-rect"></div>
        <div class="center-rect-small"></div>

        <div class="right-pill pill-1"></div>
        <div class="right-pill pill-2"></div>
        <div class="right-pill pill-3"></div>

        <div class="mid-glow glow-1"></div>
        <div class="mid-glow glow-2"></div>

        <div class="arc-wrap">
            <div class="sentiment-arc"></div>
            <div class="arc-hole"></div>

            <div class="emoji-face face-1">😟</div>
            <div class="emoji-face face-2">😐</div>
            <div class="emoji-face face-3">🙂</div>
            <div class="emoji-face face-4">😆</div>
        </div>
    </div>

    <div class="landing-container">
        <div class="hero-box">
            <h1>YouTube Sentiment Analyzer</h1>
            <form action="/analyze" method="POST" class="hero-form">
                <input type="text" name="youtube_url" placeholder="Paste YouTube URL here" required>
                <button type="submit">Analyze</button>
            </form>
        </div>
    </div>
